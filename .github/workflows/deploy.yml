# GitHub Pages Deployment Workflow
# This workflow will build and deploy your Next.js site to GitHub Pages whenever you push to 'develop' or 'main'.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["develop", "main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Future-proofing: Opt-in to Node.js 24 for JavaScript actions 
# as Node.js 20 is scheduled for deprecation in late 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Upgraded from 20 to 24 for future-proofing
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Upgraded to v5 if available, or stays v4 with Node 24 opt-in
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: |
          rm -rf src/app/api
          npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
